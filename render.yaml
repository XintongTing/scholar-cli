services:
  - type: web
    name: scholar-cli-server
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server build
    startCommand: pnpm --filter server exec prisma migrate deploy && pnpm --filter server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: S3_ENABLED
        value: "true"
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"

  - type: web
    name: scholar-cli-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
